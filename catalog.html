<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — Fashion Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
    <div class="container header-flex">
        <a href="index.html" class="logo">Fashion Store</a>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="about.html">О нас</a>
            <a href="contacts.html">Контакты</a>
        </nav>

        <form class="search-form">
            <input type="text" placeholder="Поиск товаров...">
            <button type="submit">Поиск</button>
        </form>

        <div class="header-actions">
            <a href="#" class="cart-link" title="Корзина">
                <span class="cart-icon">🛒</span>
                <span class="cart-count">0</span>
            </a>
            <a href="#" class="profile-link" title="Профиль">👤</a>
        </div>
    </div>
</header>

<main class="container">
    <section class="catalog-header">
        <h1>Каталог</h1>
        <div class="catalog-filters">
            <select class="filter-select" id="categoryFilter">
                <option value="">Все категории</option>
                <option value="hoodies">Худи</option>
                <option value="tshirts">Футболки</option>
                <option value="shirts">Рубашки</option>
            </select>
            <select class="filter-select" id="sortFilter">
                <option value="popular">По популярности</option>
                <option value="price-asc">Сначала дешевле</option>
                <option value="price-desc">Сначала дороже</option>
                <option value="new">Новинки</option>
            </select>
        </div>
    </section>

    <div class="catalog-layout">
        <aside class="sidebar">
            <h3>Цена</h3>
            <div class="price-range">
                <input type="number" placeholder="От" id="priceMin" min="0">
                <span>—</span>
                <input type="number" placeholder="До" id="priceMax">
                <button class="btn btn-sm" id="applyPrice">Применить</button>
            </div>
        </aside>

        <section class="products catalog-products" id="catalogProducts">
        </section>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>Fashion Store</h4>
                <p>Актуальная мода по доступным ценам</p>
            </div>
            <div class="footer-col">
                <h4>Каталог</h4>
                <a href="catalog.html?cat=hoodies">Худи</a>
                <a href="catalog.html?cat=tshirts">Футболки</a>
                <a href="catalog.html?cat=shirts">Рубашки</a>
            </div>
            <div class="footer-col">
                <h4>Информация</h4>
                <a href="about.html">О нас</a>
                <a href="contacts.html">Контакты</a>
            </div>
            <div class="footer-col">
                <h4>Контакты</h4>
                <p>+7 (999) 123-45-67</p>
                <p>info@fashionstore.ru</p>
            </div>
        </div>
    </div>
</footer>

<div class="modal-overlay" id="productModalOverlay"></div>
<div class="modal" id="productModal">
    <div class="modal-inner">
        <button class="modal-close" id="productModalClose" aria-label="Закрыть">×</button>
        <div class="modal-content">
            <div class="modal-image">
                <img src="" alt="" id="modalProductImage">
            </div>
            <div class="modal-info">
                <h2 id="modalProductTitle"></h2>
                <p class="modal-subtitle">
                    <span id="modalProductCategory"></span> · Артикул: <span id="modalProductSku"></span>
                </p>
                <p class="modal-price" id="modalProductPrice"></p>
                <p class="modal-desc" id="modalProductDesc"></p>
                <button class="btn btn-primary btn-add-cart-product" id="modalAddToCart">Добавить в корзину</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="cartModalOverlay"></div>
<div class="modal cart-modal" id="cartModal">
    <div class="modal-inner">
        <button class="modal-close" id="cartModalClose" aria-label="Закрыть корзину">×</button>
        <h2>Корзина</h2>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                Итого: <span id="cartTotal">0₽</span>
            </div>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/shop.js"></script>
<script src="js/main.js"></script>
<script src="js/catalog.js"></script>
</body>
</html>
