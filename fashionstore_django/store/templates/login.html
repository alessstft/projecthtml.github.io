{% extends 'base.html' %}
{% load static %}

{% block title %}Вход — Fashion Store{% endblock %}

{% block content %}
<main class="container auth-page">
    <section class="auth-card">
        <h1>Вход</h1>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p>Нет аккаунта? <a href="{% url 'register' %}?next={{ next|urlencode }}">Зарегистрироваться</a></p>
    </section>
</main>
{% endblock %}
